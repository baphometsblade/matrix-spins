    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d0f14;
            --text: #f0f0f5;
            --text-muted: #8a8a9a;
            --gold: #d4af37;
            --gold-light: #f0d060;
            --green: #2ecc71;
            --green-dark: #27ae60;
            --card-bg: rgba(255, 255, 255, 0.04);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Confetti / sparkle particles */
        .sparkle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .sparkle {
            position: absolute;
            border-radius: 50%;
            animation: sparklefall linear forwards;
            opacity: 0;
        }

        @keyframes sparklefall {
            0%   { transform: translateY(-10px) rotate(0deg) scale(0); opacity: 0; }
            10%  { opacity: 1; transform: translateY(0) rotate(45deg) scale(1); }
            80%  { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
        }

        /* Confetti rectangles */
        .confetti {
            position: absolute;
            width: 8px;
            height: 16px;
            animation: confettiDrop linear forwards;
            opacity: 0;
        }

        @keyframes confettiDrop {
            0%   { transform: translateY(-20px) rotateX(0deg) rotateZ(0deg); opacity: 0; }
            8%   { opacity: 1; }
            100% { transform: translateY(100vh) rotateX(1440deg) rotateZ(720deg); opacity: 0; }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Checkmark animation */
        .checkmark-wrap {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .checkmark-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--green);
            position: relative;
            animation: circleGrow 0.5s ease-out forwards;
            transform: scale(0);
        }

        @keyframes circleGrow {
            0%   { transform: scale(0); }
            60%  { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .checkmark-stem {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 14px;
            border-left: 4px solid var(--green);
            border-bottom: 4px solid var(--green);
            transform: translate(-55%, -65%) rotate(-45deg) scale(0);
            animation: checkDraw 0.35s ease-out 0.45s forwards;
        }

        @keyframes checkDraw {
            0%   { transform: translate(-55%, -65%) rotate(-45deg) scale(0); }
            60%  { transform: translate(-55%, -65%) rotate(-45deg) scale(1.15); }
            100% { transform: translate(-55%, -65%) rotate(-45deg) scale(1); }
        }

        .glow-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid rgba(46, 204, 113, 0.3);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50%      { transform: scale(1.15); opacity: 0; }
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--green);
            margin-bottom: 0.5rem;
        }

        .subtext {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .amount-display {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            display: none;
        }

        .amount-display.visible {
            display: block;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .balance-note {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(46, 204, 113, 0.15);
        }

        .balance-note svg {
            flex-shrink: 0;
        }

        .countdown {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .countdown span {
            color: var(--gold);
            font-weight: 600;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 2rem;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
            min-width: 170px;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #0d0f14;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(212, 175, 55, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Responsible gambling footer */
        .rg-footer {
            width: 100%;
            text-align: center;
            padding: 1.5rem 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            font-size: 0.75rem;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .rg-footer a {
            color: var(--gold);
            text-decoration: none;
        }

        .rg-footer a:hover {
            text-decoration: underline;
        }

        @media (prefers-reduced-motion: reduce) {
            .checkmark-circle { animation: none; transform: scale(1); }
            .checkmark-stem { animation: none; transform: translate(-55%, -65%) rotate(-45deg) scale(1); }
            .glow-ring, .sparkle, .confetti { animation: none; }
            .btn:hover { transform: none; }
            .amount-display.visible { animation: none; }
        }

        @media (max-width: 480px) {
            .buttons { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 280px; }
        }
    </style>

    <script>
        // Read amount from URL params
        (function() {
            var params = new URLSearchParams(window.location.search);
            var amount = params.get('amount');
            if (amount) {
                var el = document.getElementById('amount');
                var num = parseFloat(amount);
                if (!isNaN(num) && num > 0) {
                    el.textContent = '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                } else {
                    el.textContent = '$' + amount;
                }
                el.classList.add('visible');
            }
        })();

        // Countdown & redirect
        (function() {
            var seconds = 5;
            var timerEl = document.getElementById('timer');
            var interval = setInterval(function() {
                seconds--;
                timerEl.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.href = '/';
                }
            }, 1000);
        })();

        // Confetti and sparkle generator
        (function() {
            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReduced) return;

            var container = document.getElementById('sparkles');
            var sparkleColors = ['#d4af37', '#f0d060', '#2ecc71', '#9b59b6', '#e74c3c', '#3498db', '#ffffff'];
            var confettiColors = ['#d4af37', '#f0d060', '#2ecc71', '#e74c3c', '#3498db', '#9b59b6', '#f39c12'];

            function createSparkle() {
                var el = document.createElement('div');
                el.className = 'sparkle';
                el.style.left = Math.random() * 100 + '%';
                el.style.backgroundColor = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
                var size = 4 + Math.random() * 6;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.animationDuration = (2 + Math.random() * 3) + 's';
                container.appendChild(el);
                el.addEventListener('animationend', function() { el.remove(); });
            }

            function createConfetti() {
                var el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                var w = 6 + Math.random() * 6;
                el.style.width = w + 'px';
                el.style.height = (w * 1.5 + Math.random() * 8) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
                el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
                container.appendChild(el);
                el.addEventListener('animationend', function() { el.remove(); });
            }

            // Initial celebration burst
            for (var i = 0; i < 40; i++) {
                setTimeout(createSparkle, i * 50);
            }
            for (var j = 0; j < 25; j++) {
                setTimeout(createConfetti, j * 80);
            }

            // Ongoing gentle particles
            var sparkleInterval = setInterval(createSparkle, 300);
            var confettiInterval = setInterval(createConfetti, 500);

            // Stop after 8 seconds to reduce CPU usage
            setTimeout(function() {
                clearInterval(sparkleInterval);
                clearInterval(confettiInterval);
            }, 8000);
        })();
    </script>
