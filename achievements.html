<script>
(async () => {
  'use strict';

  const api = window.MatrixSpinsAPI;
  const user = await api.loadSession();
  const $ = id => document.getElementById(id);

  // ── Balance + Logout ────────────────────────────────────────
  if (user) {
    $('logout').style.display = 'inline-block';
    try {
      const b = await api.getBalance();
      $('balanceChip').textContent = api.formatCents(b.availableCents);
    } catch {}
  } else {
    $('logout').style.display = 'none';
  }
  $('logout').addEventListener('click', async () => {
    await api.logout();
    window.location.href = 'index.html';
  });

  // ── Point Values ────────────────────────────────────────────
  const RARITY_POINTS = {
    common: 10,
    uncommon: 25,
    rare: 50,
    epic: 100,
    legendary: 250
  };

  // ── Achievement Data ────────────────────────────────────────
  const ACHIEVEMENTS = [
    // Gameplay
    { id: 'first-spin',     cat: 'gameplay',    icon: '🎰', title: 'First Spin',     desc: 'Place your very first spin on any slot game.',                           rarity: 'common',    unlocked: true,  unlockedAt: '2026-03-15T14:22:00Z', progress: null, isNew: false },
    { id: 'century-club',   cat: 'gameplay',    icon: '💯', title: 'Century Club',    desc: 'Complete 100 total spins across all games.',                              rarity: 'uncommon',  unlocked: false, unlockedAt: null, progress: { current: 67, target: 100 }, isNew: false },
    { id: 'high-roller',    cat: 'gameplay',    icon: '💎', title: 'High Roller',     desc: 'Wager a total of $1,000 across all games.',                               rarity: 'rare',      unlocked: false, unlockedAt: null, progress: { current: 420, target: 1000 }, isNew: false },
    { id: 'lucky-streak',   cat: 'gameplay',    icon: '🔥', title: 'Lucky Streak',    desc: 'Win 5 games in a row without a single loss.',                             rarity: 'epic',      unlocked: false, unlockedAt: null, progress: { current: 2, target: 5 }, isNew: false },
    { id: 'jackpot-hunter', cat: 'gameplay',    icon: '🏅', title: 'Jackpot Hunter',  desc: 'Hit any jackpot prize on a progressive slot.',                            rarity: 'legendary', unlocked: false, unlockedAt: null, progress: null, isNew: false },
    { id: 'night-owl',      cat: 'gameplay',    icon: '🦉', title: 'Night Owl',       desc: 'Play any game between midnight and 4 AM.',                                rarity: 'common',    unlocked: true,  unlockedAt: '2026-04-10T02:15:00Z', progress: null, isNew: false },
    { id: 'marathon',       cat: 'gameplay',    icon: '⏱️', title: 'Marathon',        desc: 'Maintain an active gaming session for 1 hour.',                           rarity: 'uncommon',  unlocked: true,  unlockedAt: '2026-04-18T21:30:00Z', progress: null, isNew: false },
    { id: 'all-rounder',    cat: 'gameplay',    icon: '🎲', title: 'All-Rounder',     desc: 'Play at least 10 different games from the library.',                      rarity: 'rare',      unlocked: false, unlockedAt: null, progress: { current: 7, target: 10 }, isNew: false },

    // Social
    { id: 'friendly',       cat: 'social',      icon: '🤝', title: 'Friendly',        desc: 'Refer your first friend to Matrix Spins.',                               rarity: 'common',    unlocked: true,  unlockedAt: '2026-03-20T10:45:00Z', progress: null, isNew: false },
    { id: 'influencer',     cat: 'social',      icon: '📢', title: 'Influencer',      desc: 'Successfully refer 5 friends who sign up.',                              rarity: 'uncommon',  unlocked: false, unlockedAt: null, progress: { current: 4, target: 5 }, isNew: false },
    { id: 'social-butterfly', cat: 'social',    icon: '🦋', title: 'Social Butterfly', desc: 'Share a winning moment on social media.',                                rarity: 'common',    unlocked: false, unlockedAt: null, progress: null, isNew: false },
    { id: 'team-player',    cat: 'social',      icon: '⚔️', title: 'Team Player',     desc: 'Enter and compete in a tournament event.',                               rarity: 'uncommon',  unlocked: true,  unlockedAt: '2026-04-22T16:00:00Z', progress: null, isNew: true },

    // VIP
    { id: 'bronze-member',  cat: 'vip',         icon: '🥉', title: 'Bronze Member',   desc: 'Reach Bronze tier in the VIP program.',                                  rarity: 'common',    unlocked: true,  unlockedAt: '2026-03-18T09:00:00Z', progress: null, isNew: false },
    { id: 'silver-elite',   cat: 'vip',         icon: '🥈', title: 'Silver Elite',    desc: 'Advance to Silver tier in the VIP program.',                             rarity: 'uncommon',  unlocked: false, unlockedAt: null, progress: null, isNew: false },
    { id: 'gold-standard',  cat: 'vip',         icon: '🥇', title: 'Gold Standard',   desc: 'Achieve Gold tier status — a true veteran.',                             rarity: 'rare',      unlocked: false, unlockedAt: null, progress: null, isNew: false },
    { id: 'platinum-power', cat: 'vip',         icon: '💠', title: 'Platinum Power',  desc: 'Ascend to Platinum tier — elite status.',                                rarity: 'epic',      unlocked: false, unlockedAt: null, progress: null, isNew: false },
    { id: 'diamond-dynasty', cat: 'vip',        icon: '👑', title: 'Diamond Dynasty', desc: 'Reach the pinnacle: Diamond VIP tier.',                                  rarity: 'legendary', unlocked: false, unlockedAt: null, progress: null, isNew: false },

    // Milestones
    { id: 'welcome-aboard', cat: 'milestones',  icon: '🎉', title: 'Welcome Aboard',  desc: 'Log in to Matrix Spins for the first time.',                             rarity: 'common',    unlocked: true,  unlockedAt: '2026-03-15T14:00:00Z', progress: null, isNew: false },
    { id: 'depositor',      cat: 'milestones',  icon: '💵', title: 'Depositor',       desc: 'Make your first deposit into your wallet.',                              rarity: 'common',    unlocked: true,  unlockedAt: '2026-03-15T14:35:00Z', progress: null, isNew: false },
    { id: 'big-spender',    cat: 'milestones',  icon: '💰', title: 'Big Spender',     desc: 'Deposit a cumulative total of $500.',                                    rarity: 'rare',      unlocked: false, unlockedAt: null, progress: { current: 215, target: 500 }, isNew: false },
    { id: 'lucky-seven',    cat: 'milestones',  icon: '🍀', title: 'Lucky Seven',     desc: 'Win with a 7x multiplier or higher.',                                    rarity: 'uncommon',  unlocked: true,  unlockedAt: '2026-04-05T19:12:00Z', progress: null, isNew: false },
    { id: 'comeback-kid',   cat: 'milestones',  icon: '🔄', title: 'Comeback Kid',    desc: 'Score a win immediately after 10 consecutive losses.',                   rarity: 'rare',      unlocked: false, unlockedAt: null, progress: null, isNew: false },
    { id: 'daily-devotee',  cat: 'milestones',  icon: '📅', title: 'Daily Devotee',   desc: 'Log in 7 days in a row without missing a day.',                          rarity: 'uncommon',  unlocked: false, unlockedAt: null, progress: { current: 5, target: 7 }, isNew: false },
    { id: 'monthly-master', cat: 'milestones',  icon: '🗓️', title: 'Monthly Master',  desc: 'Maintain a 30-day consecutive login streak.',                            rarity: 'epic',      unlocked: false, unlockedAt: null, progress: { current: 5, target: 30 }, isNew: false }
  ];

  // ── Future API wrapper ──────────────────────────────────────
  async function fetchAchievements() {
    // Replace with: return api.get('/achievements');
    return ACHIEVEMENTS;
  }

  const achievements = await fetchAchievements();

  // ── Compute Stats ───────────────────────────────────────────
  const unlocked = achievements.filter(a => a.unlocked);
  const totalPts = unlocked.reduce((s, a) => s + RARITY_POINTS[a.rarity], 0);
  const totalCount = achievements.length;
  const unlockedCount = unlocked.length;
  const pct = Math.round((unlockedCount / totalCount) * 100);

  // Hero progress
  $('heroUnlockCount').textContent = `${unlockedCount}/${totalCount} Unlocked`;
  $('heroTotalPts').textContent = `${totalPts} pts`;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      $('heroProgressFill').style.width = pct + '%';
    });
  });

  // Stats bar
  const catCounts = {};
  achievements.forEach(a => {
    if (!catCounts[a.cat]) catCounts[a.cat] = { total: 0, done: 0 };
    catCounts[a.cat].total++;
    if (a.unlocked) catCounts[a.cat].done++;
  });
  const statsHTML = [
    `<div class="achieve-stat"><span class="num">${totalPts}</span><span class="label">Total Points</span></div>`,
    `<div class="achieve-stat"><span class="num">${unlockedCount}</span><span class="label">Unlocked</span></div>`,
    `<div class="achieve-stat"><span class="num">${totalCount - unlockedCount}</span><span class="label">Remaining</span></div>`,
    ...Object.entries(catCounts).map(([cat, c]) =>
      `<div class="achieve-stat"><span class="num">${c.done}/${c.total}</span><span class="label">${cat}</span></div>`
    )
  ].join('');
  $('achieveStats').innerHTML = statsHTML;

  // ── Render Cards ────────────────────────────────────────────
  function renderCard(a) {
    const pts = RARITY_POINTS[a.rarity];
    const isLocked = !a.unlocked;
    const newClass = a.isNew ? ' newly-unlocked' : '';
    const lockedClass = isLocked ? ' locked' : '';

    let progressHTML = '';
    if (a.progress) {
      const pPct = Math.round((a.progress.current / a.progress.target) * 100);
      progressHTML = `
        <div class="card-progress">
          <div class="card-progress-info">
            <span>${a.progress.current}/${a.progress.target}</span>
            <span>${pPct}%</span>
          </div>
          <div class="card-progress-bar">
            <div class="card-progress-fill ${a.rarity}" data-width="${pPct}"></div>
          </div>
        </div>`;
    }

    let footerHTML = '';
    if (a.unlocked && a.unlockedAt) {
      const d = new Date(a.unlockedAt);
      const formatted = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      footerHTML = `<div class="unlock-date"><span class="check">&#10003;</span> ${formatted}</div>`;
    }

    const lockIcon = isLocked ? '<div class="lock-overlay">🔒</div>' : '';

    return `
      <div class="achieve-card${lockedClass}${newClass}" data-rarity="${a.rarity}" data-cat="${a.cat}" data-status="${a.unlocked ? 'unlocked' : 'locked'}">
        ${lockIcon}
        <div class="badge-icon">${a.icon}</div>
        <div class="card-header">
          <span class="card-title">${a.title}</span>
          <span class="card-points">${pts} pts</span>
        </div>
        <span class="rarity-badge ${a.rarity}">${a.rarity}</span>
        <p class="card-desc">${a.desc}</p>
        ${progressHTML}
        ${footerHTML}
      </div>`;
  }

  function renderGrid(filter) {
    let filtered = achievements;
    if (filter === 'unlocked') filtered = achievements.filter(a => a.unlocked);
    else if (filter === 'locked') filtered = achievements.filter(a => !a.unlocked);
    else if (['gameplay', 'social', 'vip', 'milestones'].includes(filter)) {
      filtered = achievements.filter(a => a.cat === filter);
    }
    $('achieveGrid').innerHTML = filtered.map(renderCard).join('');

    // Animate progress bars after paint
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.card-progress-fill[data-width]').forEach(el => {
          el.style.width = el.dataset.width + '%';
        });
      });
    });
  }

  renderGrid('all');

  // ── Filter Tabs ─────────────────────────────────────────────
  const tabs = document.querySelectorAll('.achieve-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderGrid(tab.dataset.filter);
    });
  });

  // ── Recent Activity ─────────────────────────────────────────
  const recentUnlocks = [...achievements]
    .filter(a => a.unlocked && a.unlockedAt)
    .sort((a, b) => new Date(b.unlockedAt) - new Date(a.unlockedAt))
    .slice(0, 5);

  function timeAgo(dateStr) {
    const now = new Date();
    const then = new Date(dateStr);
    const diff = now - then;
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (days > 0) return days === 1 ? '1 day ago' : `${days} days ago`;
    if (hours > 0) return hours === 1 ? '1 hour ago' : `${hours} hours ago`;
    return mins <= 1 ? 'Just now' : `${mins} mins ago`;
  }

  $('activityList').innerHTML = recentUnlocks.map(a => `
    <div class="activity-item">
      <span class="act-icon">${a.icon}</span>
      <div class="act-info">
        <div class="act-title">${a.title}</div>
        <div class="act-desc">${a.desc}</div>
      </div>
      <span class="act-time">${timeAgo(a.unlockedAt)}</span>
    </div>
  `).join('');

})();
</script>
