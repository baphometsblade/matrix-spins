services:
  - type: web
    name: matrix-spins
    runtime: node
    plan: starter
    nodeVersion: "20"
    buildCommand: npm install --omit=dev && node scripts/bundle-js.js
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: NFT_SIGNING_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://msaart.online
      - key: PUBLIC_URL
        value: https://msaart.online
      - key: ADMIN_USERNAME
        value: admin
      # REQUIRED — set in Render dashboard Environment tab:
      # ADMIN_PASSWORD
      # DATABASE_URL
      # STRIPE_SECRET_KEY
      # STRIPE_PUBLISHABLE_KEY
      # STRIPE_WEBHOOK_SECRET
      # SMTP_HOST / SMTP_PORT / SMTP_FROM / SMTP_USER / SMTP_PASS