services:
  - type: web
    name: matrix-spins
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install --omit=dev && node scripts/bundle-js.js
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://msaart.online
      - key: PUBLIC_URL
        value: https://msaart.online
      # ─── SECRETS — DO NOT COMMIT. Set each of these in the Render dashboard ───
      # ADMIN_PASSWORD        (required in production; rotate regularly)
      # STRIPE_SECRET_KEY     (required before deposits can be taken)
      # STRIPE_PUBLISHABLE_KEY
      # STRIPE_WEBHOOK_SECRET (required; unsigned webhooks are rejected)
      # DATABASE_URL          (optional; falls back to SQLite if absent — single-instance only)
      # NFT_SIGNING_SECRET    (optional; receipt signatures remain stable across deploys if set)
      # NFT_PROVIDER          (optional; 'db' for internal receipts, or swap in a mint provider)
      # CRYPTO_WALLET_ADDRESS / BTC_WALLET_ADDRESS — only set if crypto deposit flow is wired
