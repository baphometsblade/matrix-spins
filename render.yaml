# ─────────────────────────────────────────────────────────────────────
# Render.com deployment manifest
# Docs: https://render.com/docs/blueprint-spec
#
# Auto-deploys on push to master. Health check uses the lightweight
# /api/health/ping endpoint (no DB hit) so cold-start PG warmups don't
# fail the deploy. Heavy readiness probe is /api/health/ready.
# ─────────────────────────────────────────────────────────────────────
# ── Render-managed PostgreSQL ────────────────────────────────────────
# Replaces the previous external database (whose free-tier compute quota was
# exhausted, putting the live site in degraded mode with all money ops
# returning 503). This provisions a PERSISTENT Render Postgres and wires
# DATABASE_URL into the web service automatically via `fromDatabase`
# below — no manual connection string to copy.
#
# Plan note: `basic-256mb` is the entry PAID tier (persistent, no 90-day
# expiry, no compute-hour quota — unlike free Postgres). Bump to
# basic-1gb / pro-* in the dashboard as traffic grows. Do NOT use `free`
# here: Render free Postgres expires after 90 days and is wiped, which
# would reproduce the exact degraded-mode outage we're fixing.
#
# If you ALREADY have a separate Render Postgres you pay for and want to
# reuse it instead of this blueprint-managed one: delete this `databases`
# block + the `fromDatabase` wiring below, uncomment the `DATABASE_URL`
# (sync:false) env var, and paste that DB's *Internal* Connection String
# in the dashboard.
databases:
  - name: matrix-spins-db
    plan: basic-256mb
    region: oregon
    databaseName: matrixspins
    user: matrixspins
    # Lock down inbound access — only the web service (same Render private
    # network) reaches it via the internal connection string.
    ipAllowList: []

services:
  - type: web
    name: matrix-spins
    runtime: node
    plan: free
    region: oregon
    branch: master
    autoDeploy: true
    buildCommand: npm install --omit=dev --no-audit --no-fund && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: info
      - key: NODE_VERSION
        value: "20"

      # ── Security (auto-generated unique values per deploy) ──
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true

      # ── Site origin (Cloudflare handles www → bare domain) ──
      - key: ALLOWED_ORIGIN
        value: https://msaart.online,https://www.msaart.online

      # ── Geo-blocking removed — no country/IP gating. The casino is open
      # to all jurisdictions. Ensure your licensing covers served markets.

      # ── Crypto wallet addresses (receive ETH/BTC deposits) ──
      - key: CRYPTO_WALLET_ADDRESS
        value: "0x5cee55FF03c247c1C2b4b9b4e732B087758CD863"
      - key: BTC_WALLET_ADDRESS
        value: "bc1qtl6rrtzcnrjycjdccm08d42u2qucu7qnz7ma0q"

      # ── Database — Render-managed PostgreSQL (see `databases:` above) ──
      # Auto-wired from the matrix-spins-db instance: Render injects the
      # internal connection string at deploy time. No manual step. When PG
      # is reachable the server exits degraded mode automatically (within
      # the 5-min reconnect loop) and money operations resume.
      - key: DATABASE_URL
        fromDatabase:
          name: matrix-spins-db
          property: connectionString
      #
      # (Reuse an existing Render Postgres instead? Remove the two lines
      #  of `fromDatabase` wiring + the `databases:` block above, then:
      #   - key: DATABASE_URL
      #     sync: false
      #  and paste the Internal Connection String in the dashboard.)

      # ── Stripe (REQUIRED for card deposits — set manually in dashboard) ──
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_PUBLISHABLE_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false

      # ── Email / SMTP (recommended — enables password reset + transactional) ──
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: ADMIN_EMAIL
      #   value: admin@msaart.online

      # ── Withdrawal OTP threshold ($USD; withdrawals at/above need OTP) ──
      - key: WITHDRAWAL_OTP_THRESHOLD
        value: "500"

      # ── Rate limits (per minute) ──
      - key: RL_AUTH
        value: "5"
      - key: RL_API
        value: "100"
      - key: RL_SPIN
        value: "60"
      - key: RL_ADMIN
        value: "30"

      # ── Performance / observability tuning ──
      - key: SLOW_REQUEST_MS
        value: "1500"
      - key: SLOW_QUERY_MS
        value: "500"
      - key: HEAP_WATCH_INTERVAL_MS
        value: "300000"
      - key: HEAP_WATCH_GROWTH_MB
        value: "50"

      # ── Optional: Sentry error monitoring ──
      # - key: SENTRY_DSN
      #   sync: false
      # - key: ALERT_WEBHOOK_URL
      #   sync: false
