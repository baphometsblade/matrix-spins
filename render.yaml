# ─────────────────────────────────────────────────────────────────────
# Render.com deployment manifest
# Docs: https://render.com/docs/blueprint-spec
#
# Auto-deploys on push to master. Health check uses the lightweight
# /api/health/ping endpoint (no DB hit) so cold-start PG warmups don't
# fail the deploy. Heavy readiness probe is /api/health/ready.
# ─────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: matrix-spins
    runtime: node
    plan: free
    region: oregon
    branch: master
    autoDeploy: true
    nodeVersion: "20"
    buildCommand: npm ci --omit=dev --no-audit --no-fund && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: info

      # ── Security (auto-generated unique values per deploy) ──
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true

      # ── Site origin (Cloudflare handles www → bare domain) ──
      - key: ALLOWED_ORIGIN
        value: https://msaart.online,https://royal-slots-casino.vercel.app

      # ── Geo compliance (REQUIRED for real-money operation) ──
      # Whitelist of ISO country codes allowed to play. Without this,
      # the geo-block middleware is a no-op and you risk operating
      # in jurisdictions you are not licensed in.
      - key: ALLOWED_COUNTRIES
        value: "AU,NZ,CA,GB,DE,FR,JP,BR,MX"
      # Optional explicit denylist (applied after allowlist)
      - key: BLOCKED_COUNTRIES
        value: "US"
      # On geo lookup failure: "open" allows (default), "closed" blocks
      - key: GEO_FAIL_MODE
        value: open

      # ── Crypto wallet addresses (receive ETH/BTC deposits) ──
      - key: CRYPTO_WALLET_ADDRESS
        value: "0x5cee55FF03c247c1C2b4b9b4e732B087758CD863"
      - key: BTC_WALLET_ADDRESS
        value: "bc1qtl6rrtzcnrjycjdccm08d42u2qucu7qnz7ma0q"

      # ── Database (REQUIRED — provision PostgreSQL on Neon/Supabase/Render) ──
      # Without DATABASE_URL the server runs SQLite which is wiped on every
      # redeploy — money operations will be permanently blocked in degraded mode.
      # Set this manually in the Render dashboard with a real connection string:
      #   postgresql://user:pass@host:5432/dbname?sslmode=require
      # - key: DATABASE_URL
      #   sync: false

      # ── Stripe (REQUIRED for card deposits — set manually in dashboard) ──
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_PUBLISHABLE_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false

      # ── Email / SMTP (recommended — enables password reset + transactional) ──
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: ADMIN_EMAIL
      #   value: admin@msaart.online

      # ── Withdrawal OTP threshold ($USD; withdrawals at/above need OTP) ──
      - key: WITHDRAWAL_OTP_THRESHOLD
        value: "500"

      # ── Rate limits (per minute) ──
      - key: RL_AUTH
        value: "5"
      - key: RL_API
        value: "100"
      - key: RL_SPIN
        value: "60"
      - key: RL_ADMIN
        value: "30"

      # ── Performance / observability tuning ──
      - key: SLOW_REQUEST_MS
        value: "1500"
      - key: SLOW_QUERY_MS
        value: "500"
      - key: HEAP_WATCH_INTERVAL_MS
        value: "300000"
      - key: HEAP_WATCH_GROWTH_MB
        value: "50"

      # ── Optional: Sentry error monitoring ──
      # - key: SENTRY_DSN
      #   sync: false
      # - key: ALERT_WEBHOOK_URL
      #   sync: false
