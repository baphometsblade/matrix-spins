services:
  - type: web
    name: matrix-spins
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Security (auto-generated unique values per deploy) ──
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true

      # ── Site origin (Cloudflare handles www → bare domain) ──
      - key: ALLOWED_ORIGIN
        value: https://msaart.online

      # ── Crypto wallet addresses (receive ETH/BTC deposits) ──
      - key: CRYPTO_WALLET_ADDRESS
        value: "0x5cee55FF03c247c1C2b4b9b4e732B087758CD863"
      - key: BTC_WALLET_ADDRESS
        value: "bc1qtl6rrtzcnrjycjdccm08d42u2qucu7qnz7ma0q"

      # ── Stripe (set manually in Render dashboard — keep secret) ──
      # - key: STRIPE_SECRET_KEY
      #   value: sk_live_...
      # - key: STRIPE_PUBLISHABLE_KEY
      #   value: pk_live_...
      # - key: STRIPE_WEBHOOK_SECRET
      #   value: whsec_...

      # ── Email / SMTP (optional — enables password reset emails) ──
      # - key: SMTP_HOST
      #   value: smtp.example.com
      # - key: SMTP_USER
      #   value: noreply@msaart.online
      # - key: SMTP_PASS
      #   value: ...
      # - key: ADMIN_EMAIL
      #   value: admin@msaart.online

      # ── Database (optional — defaults to SQLite if not set) ──
      # - key: DATABASE_URL
      #   value: postgresql://...
