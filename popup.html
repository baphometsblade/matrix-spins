<!DOCTYPE html>
<html>
<head>
  <title>Affiliate Transparency</title>
  <style>
    body {
      font-family: sans-serif;
      width: 350px;
      padding: 10px;
    }
    h1 {
      font-size: 16px;
      margin-top: 0;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin-bottom: 10px;
      max-height: 200px;
      overflow-y: auto;
    }
    li {
      margin-bottom: 5px;
      font-size: 12px;
      word-wrap: break-word;
    }
    .url {
      font-weight: bold;
    }
    .timestamp {
      font-size: 11px;
      color: gray;
    }
    .footer {
      border-top: 1px solid #eee;
      padding-top: 10px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .settings-link {
        cursor: pointer;
        color: blue;
        text-decoration: underline;
    }
    .premium-promo {
        font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Detected Affiliate Links</h1>
  <ul id="affiliate-links">
  </ul>
  <div class="footer">
      <div id="premium-promo" class="premium-promo" style="display: none;">
          <p>Protect your links! <a href="#" id="upgrade-link">Upgrade to Premium</a> for our Cookie Lock feature.</p>
      </div>
      <div id="premium-status" style="display: none;">
          <p><strong>Premium User</strong> ✨</p>
      </div>
      <a href="#" id="settings-link" class="settings-link">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
