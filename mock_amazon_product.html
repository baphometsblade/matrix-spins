<!DOCTYPE html>
<html>
<head>
    <title>Mock Product Page</title>
</head>
<body>
    <h1>Mock Amazon Product Page</h1>

    <div id="centerCol">
        <div id="title_feature_div">
            <h1 id="title">
                <span id="productTitle" class="a-size-large product-title-word-break">
                    Example Laptop Model with Extra Features
                </span>
            </h1>
        </div>

        <div id="corePrice_feature_div">
            <span class="a-price a-text-price a-size-medium">
                <span class="a-offscreen">$999.99</span>
                <span aria-hidden="true">
                    <span class="a-price-symbol">$</span>
                    <span class="a-price-whole">999<span class="a-price-decimal">.</span></span>
                    <span class="a-price-fraction">99</span>
                </span>
            </span>
        </div>
    </div>

</body>
</html>
