<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Shopping Dashboard</title>
    <style>
        /* ... (Existing styles remain the same) ... */
        /* --- New Referral Card Styles --- */
        #referral-card { text-align: center; }
        #referral-code {
            font-family: monospace;
            font-size: 20px;
            background-color: #e9e9eb;
            color: #333;
            padding: 10px 15px;
            border-radius: 6px;
            display: inline-block;
            margin: 10px 0;
            border: 1px solid #ddd;
        }
        #referral-input-group { margin-top: 15px; }
        #referral-input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        #apply-referral-button {
            background-color: #34c759;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        #referral-status { margin-top: 10px; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header><h1>Your Dashboard</h1><div id="auth-status"><button id="login-button">Login</button></div></header>

    <div class="grid-container">
        <!-- Existing Sections -->
        <div id="sponsored-section" class="card"></div>
        <div id="upgrade-card" class="card" style="display: none;"></div>

        <!-- New Referral Card -->
        <div id="referral-card" class="card">
            <h2>Refer a Friend & Earn $5</h2>
            <p>Share your code with a friend. When they sign up, you both get a $5 bonus!</p>
            <div id="referral-code-display">
                Your unique code: <span id="referral-code"></span>
            </div>
            <div id="referral-input-group">
                <p>Have a code?</p>
                <input type="text" id="referral-input" placeholder="Enter referral code">
                <button id="apply-referral-button">Apply</button>
                <div id="referral-status"></div>
            </div>
        </div>

        <div id="rewards-card" class="card"></div>
        <div id="watched-products-card" class="card"></div>
        <div id="partner-stores-card" class="card"></div>
    </div>

    <script src="portal.js"></script>
</body>
</html>
