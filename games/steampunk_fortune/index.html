  <script>
    window.GAME_CONFIG = {
  "id": "steampunk_fortune",
  "name": "Steampunk Fortune",
  "provider": "ironclad",
  "studioId": "ironclad",
  "symbols": [
    "s1_gear",
    "s2_steam_pipe",
    "s3_goggles",
    "s4_airship",
    "s5_clockwork_heart",
    "wild_inventor"
  ],
  "gridCols": 5,
  "gridRows": 4,
  "winType": "payline",
  "wildSymbol": "wild_inventor",
  "scatterSymbol": "s5_clockwork_heart",
  "rtp": 91.7,
  "volatility": "medium",
  "bonusType": "collector",
  "freeSpinsCount": 10,
  "freeSpinsTrigger": 3,
  "clusterMin": 5,
  "minBet": 0.2,
  "maxBet": 2000
};
    window.GAME_MECHANIC = {
            _gameIdx: 97,
            _collected: 0,
            _threshold: 15,
            onResult: function(grid, cfg, st, baseWin) {
                // Count special symbols
                var count = 0;
                for (var c = 0; c < grid.length; c++) for (var r = 0; r < grid[c].length; r++) {
                    if (grid[c][r] === cfg.symbols[0]) count++;
                }
                this._collected += count;
                if (this._collected >= this._threshold) {
                    var bonus = st.bet * 20;
                    this._collected = 0;
                    return { winAmount: baseWin + bonus, isFeature: true, message: 'COLLECTION COMPLETE!', sub: 'Bonus: $' + bonus.toFixed(2) };
                }
                if (count > 0) return { sub: 'Collected: ' + this._collected + '/' + this._threshold };
                return null;
            }
        };
  </script>
