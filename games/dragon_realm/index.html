                if (st.freeSpinsActive && baseWin > 0) {

                    return { winAmount: baseWin + bonus, message: 'UPGRADE LEVEL ' + this._upgradeLevel + '!', sub: 'Symbols enhanced!' };
                }
                if (!st.freeSpinsActive) this._upgradeLevel = 0;
                return null;
            }
        };
