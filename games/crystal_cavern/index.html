    window.GAME_MECHANIC = {

                if (baseWin > 0) {
                    this._cascadeCount++;
                    var lvl = Math.min(this._cascadeCount, this._levels.length) - 1;
                    var mult = this._levels[lvl];
                    return { winAmount: baseWin * mult, message: mult > 1 ? 'CASCADE x' + mult : '', sub: 'Level ' + (lvl + 1) };
                }
                this._cascadeCount = 0;
                return null;
            }
        };
