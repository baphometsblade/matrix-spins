  <script>
    window.GAME_CONFIG = {
  "id": "avalon_castle",
  "name": "Avalon's Call",
  "provider": "mythic-forge",
  "studioId": "mythic-forge",
  "symbols": [
    "s1_avalon_tower",
    "s2_lady_lake",
    "s3_sword_stone",
    "s4_magic_scroll",
    "s5_avalon_mist",
    "wild_avalon_crown"
  ],
  "gridCols": 5,
  "gridRows": 4,
  "winType": "payline",
  "wildSymbol": "wild_avalon_crown",
  "scatterSymbol": "s5_avalon_mist",
  "rtp": 91.15,
  "volatility": "medium",
  "bonusType": "expanding_symbol",
  "freeSpinsCount": 10,
  "freeSpinsTrigger": 3,
  "clusterMin": 5,
  "minBet": 0.2,
  "maxBet": 3000
};
    window.GAME_MECHANIC = {
            _gameIdx: 50,
            _expandSym: null,
            onResult: function(grid, cfg, st, baseWin) {
                if (st.freeSpinsActive && baseWin > 0) {
                    if (!this._expandSym) {
                        var candidates = cfg.symbols.filter(function(s) { return s !== cfg.wildSymbol && s !== cfg.scatterSymbol; });
                        this._expandSym = candidates[Math.floor(Math.random() * candidates.length)];
                    }
                    // Count expanded symbol appearances
                    var count = 0;
                    for (var c = 0; c < grid.length; c++) for (var r = 0; r < grid[c].length; r++) {
                        if (grid[c][r] === this._expandSym) count++;
                    }
                    if (count >= 2) {
                        return { winAmount: baseWin * 1.5, message: 'EXPANDING ' + this._expandSym.replace(/^s\d+_/,'').toUpperCase() + '!', sub: '' };
                    }
                }
                if (!st.freeSpinsActive) this._expandSym = null;
                return null;
            }
        };
  </script>
