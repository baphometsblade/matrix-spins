<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/manifest.json">
<title>Sign In — Matrix Spins</title>
<link rel="canonical" href="https://msaart.online/login.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="unified-ux.css">
<script src="js/unified-ux.js" defer></script>
    <link rel="stylesheet" href="css/search.css">
</head>
<body>
<div class="rs-shell">
  <div class="rs-brand">Matrix Spins</div>
  <div class="rs-card">
    <h1>Welcome back</h1>
    <p class="muted" style="margin-bottom:1.4rem;">Sign in to continue playing.</p>
    <div id="alert" class="alert" role="alert" aria-live="assertive"></div>
    <form id="f">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button id="submit" class="btn" type="submit">Sign in</button>
    </form>
    <div class="links">
      <a href="signup.html">Create an account</a>
      <a href="#" id="forgotLink">Forgot password?</a>
      <a href="index.html">Back to home</a>
    </div>
    <!-- Forgot-password panel — shown when the user clicks "Forgot password?".
         Hits the existing /api/auth/forgot-password endpoint (CSRF-exempt per
         csrf.js:84). Previously the link was missing entirely — locked-out
         users had no recovery path even though the server supported it. -->
    <div id="forgotPanel" style="display:none;margin-top:1.2rem;padding:1rem;border:1px solid rgba(255,255,255,0.12);border-radius:10px;background:rgba(255,255,255,0.04);">
      <p class="muted" style="margin:0 0 0.8rem;font-size:0.92rem;">Enter the email on your account and we'll send a password-reset link.</p>
      <div class="field">
        <label for="forgotEmail">Email</label>
        <input id="forgotEmail" name="forgotEmail" type="email" autocomplete="email">
      </div>
      <button id="forgotSubmit" class="btn" type="button">Send reset link</button>
      <div id="forgotMsg" class="alert" role="alert" aria-live="polite" style="margin-top:0.8rem;"></div>
    </div>
  </div>
</div>
<script src="js/api-client.js"></script>
<script>
(async () => {
  const api = window.MatrixSpinsAPI;
  const alertEl = document.getElementById('alert');
  const form = document.getElementById('f');
  const submit = document.getElementById('submit');

  // If already signed in, redirect to lobby
  const u = await api.loadSession();
  if (u) { window.location.href = 'index.html'; return; }

  function showError(msg) {
    alertEl.textContent = msg;
    alertEl.classList.add('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertEl.classList.remove('visible');
    submit.disabled = true;
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    try {
      await api.login(email, password);
      const params = new URLSearchParams(location.search);
      window.location.href = params.get('next') || 'index.html';
    } catch (err) {
      showError(err.message || 'Sign-in failed.');
      submit.disabled = false;
    }
  });

  // Forgot-password — toggle panel + submit handler. Posts to the existing
  // public /api/auth/forgot-password route which always responds 200 to
  // avoid leaking which emails are registered.
  const forgotLink = document.getElementById('forgotLink');
  const forgotPanel = document.getElementById('forgotPanel');
  const forgotEmailInput = document.getElementById('forgotEmail');
  const forgotSubmit = document.getElementById('forgotSubmit');
  const forgotMsg = document.getElementById('forgotMsg');
  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    const visible = forgotPanel.style.display !== 'none';
    forgotPanel.style.display = visible ? 'none' : 'block';
    if (!visible) {
      // Pre-fill from the main email field for convenience.
      forgotEmailInput.value = document.getElementById('email').value.trim();
      forgotEmailInput.focus();
    }
  });
  forgotSubmit.addEventListener('click', async () => {
    const email = forgotEmailInput.value.trim();
    if (!email || !/.+@.+\..+/.test(email)) {
      forgotMsg.className = 'alert visible'; forgotMsg.textContent = 'Please enter a valid email address.';
      return;
    }
    forgotSubmit.disabled = true;
    forgotMsg.classList.remove('visible');
    // The server always returns 200 here (it deliberately doesn't reveal
    // whether the email exists, to prevent account-enumeration). Surface
    // the same success message in both code paths so a network error
    // doesn't accidentally leak any signal either.
    try { await api.fetch('/auth/forgot-password', { method: 'POST', body: { email } }); }
    catch (_) { /* swallow — same UI either way */ }
    forgotMsg.className = 'alert success visible';
    forgotMsg.textContent = 'If that email matches an account, a reset link has been sent. Check your inbox (and spam folder).';
    forgotSubmit.disabled = false;
  });
})();
</script>
    <script src="js/social-proof.js" defer></script>
    <script src="js/deposit-urgency.js" defer></script>
    <script src="js/onboarding.js" defer></script>
    <link rel="stylesheet" href="css/chat-widget.css">
    <link rel="stylesheet" href="css/notifications.css">
    <script src="js/chat-widget.js" defer></script>
    <script src="js/notifications.js" defer></script>
    <script src="/js/pwa-install.js" defer></script>
    <script src="js/age-gate.js" defer></script>
    <script src="js/cookie-consent.js" defer></script>
    <script src="js/search.js" defer></script>
</body>
</html>
