<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Jules' Palace</h1>
        <div id="user-info" style="display: none;">
            <span id="username-display"></span>
            <div class="wallet">
                <span>Balance: $</span><span id="balance">0</span>
            </div>
            <button id="logout-btn" class="nav-btn">Logout</button>
        </div>
    </header>

    <main>
        <!-- Auth View (Visible on startup) -->
        <div id="auth-view" class="view">
            <div class="auth-container">
                <h2>Login</h2>
                <input type="text" id="login-username" placeholder="Username">
                <input type="password" id="login-password" placeholder="Password">
                <button id="login-btn">Login</button>
                <p id="auth-message"></p>
                <hr>
                <h2>Register</h2>
                <input type="text" id="register-username" placeholder="Username">
                <input type="password" id="register-password" placeholder="Password">
                <button id="register-btn">Register</button>
            </div>
        </div>

        <!-- Casino View (Hidden by default) -->
        <div id="casino-view" style="display: none;">
            <nav>
                <button id="lobby-btn" class="nav-btn">Lobby</button>
            </nav>
            <div id="lobby-view" class="view">
            <h2>Choose a Game</h2>
            <div class="game-selection">
                <div class="game-card">
                    <h3>Blackjack</h3>
                    <button class="play-btn" data-game="blackjack">Play</button>
                </div>
                <div class="game-card">
                    <h3>Slot Machine</h3>
                    <button class="play-btn" data-game="slots">Play</button>
                </div>
                <div class="game-card">
                    <h3>Roulette</h3>
                    <button class="play-btn" data-game="roulette">Play</button>
                </div>
                <div class="game-card">
                    <h3>Video Poker</h3>
                    <button class="play-btn" data-game="video-poker">Play</button>
                </div>
            </div>
        </div>

        <!-- Blackjack View -->
        <div id="blackjack-view" class="view" style="display: none;">
            <h2>Blackjack</h2>
            <div id="betting-area">
                <input type="number" id="bet-amount" value="10" min="1">
                <button id="place-bet-btn">Place Bet</button>
            </div>
            <div id="blackjack-table">
                <div class="hand-area">
                    <h3>Dealer's Hand (<span id="dealer-score">0</span>)</h3>
                    <div id="dealer-hand" class="card-container"></div>
                </div>
                <div class="hand-area">
                    <h3>Your Hand (<span id="player-score">0</span>)</h3>
                    <div id="player-hand" class="card-container"></div>
                </div>
            </div>
            <div id="blackjack-actions" class="game-actions" style="display: none;">
                <button id="hit-btn">Hit</button>
                <button id="stand-btn">Stand</button>
            </div>
            <p id="blackjack-message" class="game-message"></p>
        </div>

        <!-- Slots View -->
        <div id="slots-view" class="view" style="display: none;">
            <h2>Slot Machine</h2>
            <div id="slots-container">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>
            <div id="slots-actions" class="game-actions">
                <label for="slots-bet">Bet:</label>
                <input type="number" id="slots-bet" value="5" min="1">
                <button id="spin-btn">Spin</button>
            </div>
            <p id="slots-message" class="game-message"></p>
        </div>

        <!-- Roulette View -->
        <div id="roulette-view" class="view" style="display: none;">
            <h2>Roulette</h2>
            <div id="roulette-container">
                <div id="roulette-wheel">
                    <div id="wheel-inner"></div>
                    <div id="ball"></div>
                    <div id="winning-number-display">00</div>
                </div>
                <div id="roulette-table"></div>
            </div>
            <div id="roulette-actions" class="game-actions">
                <label for="roulette-bet">Bet Amount:</label>
                <input type="number" id="roulette-bet" value="10" min="1">
                <button id="spin-roulette-btn">Spin</button>
                <button id="clear-bets-btn">Clear Bets</button>
            </div>
            <p id="roulette-message" class="game-message"></p>
        </div>

        <!-- Video Poker View -->
        <div id="video-poker-view" class="view" style="display: none;">
            <h2>Video Poker</h2>
            <div id="poker-betting-area">
                <input type="number" id="poker-bet-amount" value="5" min="1">
                <button id="deal-poker-btn">Deal</button>
            </div>
            <div id="poker-hand" class="card-container">
                <!-- Cards will be generated here -->
            </div>
            <div id="poker-actions" class="game-actions">
                <button id="draw-btn" disabled>Draw</button>
            </div>
            <p id="poker-message" class="game-message"></p>
        </div>
    </div>
</main>

    <div id="message-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p id="modal-message"></p>
            <button id="close-modal-btn">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
