<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d2818"/>
      <stop offset="55%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="55%" stop-color="#00d635"/>
      <stop offset="100%" stop-color="#00b82e"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.5"/></feComponentTransfer>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Dense Matrix rain -->
  <g font-family="Consolas,monospace" font-size="22" fill="#00ff41" opacity="0.15">
    <g><text x="36" y="60">1</text><text x="36" y="100">0</text><text x="36" y="140">1</text><text x="36" y="180">0</text><text x="36" y="220">1</text><text x="36" y="260">1</text><text x="36" y="300">0</text><text x="36" y="340">0</text><text x="36" y="380">1</text><text x="36" y="420">0</text><text x="36" y="460">1</text></g>
    <g><text x="76" y="80">0</text><text x="76" y="120">1</text><text x="76" y="160">0</text><text x="76" y="200">0</text><text x="76" y="240">1</text><text x="76" y="280">0</text><text x="76" y="320">1</text><text x="76" y="360">0</text><text x="76" y="400">1</text><text x="76" y="440">1</text></g>
    <g><text x="116" y="50">1</text><text x="116" y="90">0</text><text x="116" y="130">1</text><text x="116" y="170">1</text><text x="116" y="210">0</text><text x="116" y="250">0</text><text x="116" y="290">1</text><text x="116" y="330">1</text><text x="116" y="370">0</text><text x="116" y="410">1</text></g>
    <g><text x="396" y="55">0</text><text x="396" y="95">1</text><text x="396" y="135">1</text><text x="396" y="175">0</text><text x="396" y="215">1</text><text x="396" y="255">0</text><text x="396" y="295">1</text><text x="396" y="335">1</text><text x="396" y="375">0</text><text x="396" y="415">0</text></g>
    <g><text x="436" y="75">1</text><text x="436" y="115">0</text><text x="436" y="155">1</text><text x="436" y="195">0</text><text x="436" y="235">1</text><text x="436" y="275">1</text><text x="436" y="315">0</text><text x="436" y="355">1</text><text x="436" y="395">0</text><text x="436" y="435">1</text></g>
    <g><text x="476" y="60">0</text><text x="476" y="100">0</text><text x="476" y="140">1</text><text x="476" y="180">1</text><text x="476" y="220">0</text><text x="476" y="260">1</text><text x="476" y="300">0</text><text x="476" y="340">1</text><text x="476" y="380">1</text><text x="476" y="420">0</text></g>
  </g>
  <!-- Brighter green head-of-stream characters -->
  <g font-family="Consolas,monospace" font-size="22" fill="#aaffaa" opacity="0.85">
    <text x="36" y="320">M</text>
    <text x="76" y="200">S</text>
    <text x="116" y="290">$</text>
    <text x="396" y="255">▲</text>
    <text x="436" y="315">7</text>
    <text x="476" y="260">★</text>
  </g>
  <!-- Center M emblem -->
  <g filter="url(#shadow)">
    <text x="256" y="330" text-anchor="middle" font-family="'Courier New',monospace" font-size="260" font-weight="900" fill="url(#glow)" filter="url(#textGlow)">M</text>
  </g>
  <!-- Spins subtitle -->
  <text x="256" y="400" text-anchor="middle" font-family="'Courier New',monospace" font-size="42" font-weight="700" fill="#00ff41" letter-spacing="6" opacity="0.95">SPINS</text>
  <!-- 3 reel dots -->
  <g fill="none" stroke="#00ff41" stroke-width="4" opacity="0.9">
    <circle cx="180" cy="448" r="14"/>
    <circle cx="256" cy="448" r="14"/>
    <circle cx="332" cy="448" r="14"/>
  </g>
  <!-- Border glow -->
  <rect x="8" y="8" width="496" height="496" rx="92" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.55"/>
</svg>
