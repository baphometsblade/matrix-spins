<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="sw-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1C4E9"/>
      <stop offset="50%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="sw-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B388FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#B388FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#B388FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="sw-distress">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
    <filter id="sw-shadow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark atmospheric background element -->
  <rect x="0" y="0" width="300" height="80" fill="#1A0A2E" opacity="0.12" rx="4"/>
  <!-- Gothic arch silhouette -->
  <path d="M35 65 L35 30 Q35 12, 54 12 Q73 12, 73 30 L73 65" fill="none" stroke="#B388FF" stroke-width="1.5" opacity="0.35"/>
  <path d="M40 65 L40 32 Q40 18, 54 18 Q68 18, 68 32 L68 65" fill="none" stroke="#7C4DFF" stroke-width="0.8" opacity="0.2"/>
  <!-- Gothic window cross -->
  <line x1="54" y1="20" x2="54" y2="55" stroke="#B388FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="38" x2="68" y2="38" stroke="#B388FF" stroke-width="0.8" opacity="0.3"/>
  <!-- Glowing eye/orb in window -->
  <circle cx="54" cy="32" r="6" fill="#B388FF" opacity="0.15" filter="url(#sw-shadow)"/>
  <circle cx="54" cy="32" r="3" fill="#B388FF" opacity="0.4"/>
  <circle cx="54" cy="32" r="1.2" fill="#D1C4E9" opacity="0.8"/>
  <!-- Dripping/distress marks -->
  <line x1="30" y1="60" x2="30" y2="70" stroke="#B388FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="78" y1="55" x2="78" y2="68" stroke="#B388FF" stroke-width="0.5" opacity="0.15"/>
  <line x1="24" y1="50" x2="24" y2="58" stroke="#7C4DFF" stroke-width="0.4" opacity="0.15"/>
  <!-- Scattered dark particles -->
  <circle cx="20" cy="25" r="0.8" fill="#B388FF" opacity="0.3"/>
  <circle cx="85" cy="20" r="0.6" fill="#B388FF" opacity="0.2"/>
  <circle cx="15" cy="60" r="0.5" fill="#7C4DFF" opacity="0.25"/>
  <circle cx="90" cy="55" r="0.7" fill="#B388FF" opacity="0.2"/>
  <!-- Main text with gothic feel -->
  <text x="192" y="34" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="bold" fill="url(#sw-purple)" letter-spacing="5" filter="url(#sw-distress)">SHADOW</text>
  <text x="192" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#B388FF" letter-spacing="7" opacity="0.7">WORKS</text>
  <!-- Distressed accent lines -->
  <line x1="108" y1="62" x2="276" y2="62" stroke="url(#sw-fade)" stroke-width="0.5"/>
  <line x1="115" y1="64" x2="269" y2="64" stroke="url(#sw-fade)" stroke-width="0.3" opacity="0.4"/>
  <!-- Crack/distress marks near text -->
  <path d="M120 40 L125 38 L128 42" fill="none" stroke="#B388FF" stroke-width="0.4" opacity="0.2"/>
  <path d="M268 35 L272 38 L270 42" fill="none" stroke="#B388FF" stroke-width="0.4" opacity="0.2"/>
</svg>