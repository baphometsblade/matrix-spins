<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="mf-jewel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="50%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="mf-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9E9E9E"/>
      <stop offset="50%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <filter id="mf-chisel">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  <!-- Stone tablet background -->
  <rect x="8" y="8" width="284" height="64" rx="3" fill="#424242" opacity="0.15"/>
  <rect x="10" y="10" width="280" height="60" rx="2" fill="none" stroke="#757575" stroke-width="1" opacity="0.3"/>
  <!-- Runic border marks -->
  <line x1="20" y1="14" x2="20" y2="22" stroke="#E040FB" stroke-width="1.5" opacity="0.5"/>
  <line x1="17" y1="18" x2="23" y2="18" stroke="#E040FB" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="14" x2="280" y2="22" stroke="#E040FB" stroke-width="1.5" opacity="0.5"/>
  <line x1="277" y1="18" x2="283" y2="18" stroke="#E040FB" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="58" x2="20" y2="66" stroke="#E040FB" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="58" x2="280" y2="66" stroke="#E040FB" stroke-width="1.5" opacity="0.5"/>
  <!-- Anvil/forge icon -->
  <path d="M35 52 L45 52 L48 48 L60 48 L63 52 L73 52 L70 56 L38 56 Z" fill="url(#mf-stone)" opacity="0.8"/>
  <rect x="46" y="35" width="16" height="13" rx="1" fill="#757575" opacity="0.7"/>
  <path d="M42 35 L66 35 L62 30 L46 30 Z" fill="#9E9E9E" opacity="0.6"/>
  <!-- Hammer -->
  <rect x="52" y="18" width="4" height="14" rx="1" fill="#8D6E63" opacity="0.7"/>
  <rect x="46" y="14" width="16" height="6" rx="2" fill="url(#mf-jewel)" opacity="0.8"/>
  <!-- Sparks from forge -->
  <circle cx="44" cy="28" r="1.2" fill="#E040FB" opacity="0.7"/>
  <circle cx="65" cy="25" r="1" fill="#F48FB1" opacity="0.6"/>
  <circle cx="40" cy="22" r="0.8" fill="#E040FB" opacity="0.5"/>
  <circle cx="68" cy="30" r="0.7" fill="#CE93D8" opacity="0.5"/>
  <!-- Runic decorative symbols -->
  <path d="M88 30 L92 22 L96 30 M92 22 L92 34" stroke="#E040FB" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M88 50 L96 42 M88 42 L96 50" stroke="#E040FB" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Main text - stone carved feel -->
  <text x="192" y="35" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="bold" fill="url(#mf-jewel)" letter-spacing="4">MYTHIC</text>
  <text x="192" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#CE93D8" letter-spacing="6" opacity="0.8">FORGE</text>
  <!-- Decorative rune dots -->
  <circle cx="120" cy="64" r="1.5" fill="#E040FB" opacity="0.3"/>
  <circle cx="135" cy="64" r="1.5" fill="#E040FB" opacity="0.3"/>
  <circle cx="249" cy="64" r="1.5" fill="#E040FB" opacity="0.3"/>
  <circle cx="264" cy="64" r="1.5" fill="#E040FB" opacity="0.3"/>
  <!-- Stone texture lines -->
  <line x1="105" y1="40" x2="112" y2="40" stroke="#757575" stroke-width="0.5" opacity="0.3"/>
  <line x1="272" y1="40" x2="278" y2="40" stroke="#757575" stroke-width="0.5" opacity="0.3"/>
</svg>