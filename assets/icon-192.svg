<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d2818"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00b82e"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.4"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Matrix rain columns -->
  <g font-family="Consolas,monospace" font-size="11" fill="#00ff41" opacity="0.18">
    <text x="14" y="30">1</text><text x="14" y="48">0</text><text x="14" y="66">1</text><text x="14" y="84">0</text><text x="14" y="102">1</text><text x="14" y="120">1</text><text x="14" y="138">0</text>
    <text x="34" y="42">0</text><text x="34" y="60">1</text><text x="34" y="78">0</text><text x="34" y="96">0</text><text x="34" y="114">1</text><text x="34" y="132">0</text><text x="34" y="150">1</text>
    <text x="148" y="36">1</text><text x="148" y="54">1</text><text x="148" y="72">0</text><text x="148" y="90">1</text><text x="148" y="108">0</text><text x="148" y="126">0</text><text x="148" y="144">1</text>
    <text x="168" y="48">0</text><text x="168" y="66">1</text><text x="168" y="84">0</text><text x="168" y="102">1</text><text x="168" y="120">1</text><text x="168" y="138">0</text>
  </g>
  <!-- Center M emblem with spin reels -->
  <g filter="url(#shadow)">
    <text x="96" y="124" text-anchor="middle" font-family="'Courier New',monospace" font-size="96" font-weight="900" fill="url(#glow)">M</text>
  </g>
  <!-- 3 reel slots under the M -->
  <g fill="none" stroke="#00ff41" stroke-width="2" opacity="0.9">
    <circle cx="60" cy="160" r="6"/>
    <circle cx="96" cy="160" r="6"/>
    <circle cx="132" cy="160" r="6"/>
  </g>
  <!-- Border glow -->
  <rect x="3" y="3" width="186" height="186" rx="34" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.5"/>
</svg>
