<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="8;url=/" />
<title>404 - Page Not Found | Royal Slots Casino</title>
<meta name="robots" content="noindex, nofollow">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
.container { max-width:500px; padding:40px 20px; }
h1 { font-size:clamp(48px, 15vw, 96px); color:#f59e0b; margin-bottom:16px; text-shadow:0 0 30px rgba(245,158,11,0.4); }
h2 { font-size:clamp(18px, 4vw, 24px); margin-bottom:12px; color:#e2e8f0; }
p { color:#94a3b8; margin-bottom:32px; line-height:1.6; font-size:clamp(14px, 3vw, 16px); }
.btn { display:inline-block; background:linear-gradient(135deg,#f59e0b,#d97706); color:#000;
    padding:14px 32px; border-radius:8px; text-decoration:none; font-weight:700; font-size:16px;
    transition:transform 0.2s, box-shadow 0.2s; }
.btn:hover { transform:scale(1.05); box-shadow:0 4px 20px rgba(245,158,11,0.4); }
.btn:focus { outline:2px solid #f59e0b; outline-offset:4px; }
.slots { font-size:48px; margin-bottom:24px; }
.redirect { color:#64748b; font-size:13px; margin-top:20px; }
</style>
</head>
<body>
<main class="container" role="main">
    <div class="slots" aria-hidden="true">&#127920;</div>
    <h1>404</h1>
    <h2>This reel came up empty!</h2>
    <p>The page you're looking for doesn't exist. Head back to the lobby and try your luck on our 150+ premium slot games.</p>
    <a href="/" class="btn">Back to Lobby</a>
    <p class="redirect">Redirecting to lobby in <span id="countdown">8</span> seconds&hellip;</p>
</main>
<script>
(function() {
    var el = document.getElementById('countdown');
    var sec = 8;
    var t = setInterval(function() {
        sec--;
        if (el) el.textContent = sec;
        if (sec <= 0) { clearInterval(t); window.location.href = '/'; }
    }, 1000);
    window.addEventListener('beforeunload', function() { clearInterval(t); });
})();
</script>
</body>
</html>
