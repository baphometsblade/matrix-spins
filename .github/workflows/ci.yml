name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel any prior runs for the same ref so we don't waste CI on stale commits
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint • Test • Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']

    env:
      NODE_ENV: test
      CI: true
      JWT_SECRET: ci-test-secret-must-be-at-least-32-chars-long
      ADMIN_PASSWORD: ci-test-admin-pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage
        continue-on-error: false

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: matrix.node == '20' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node }}
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: matrix.node == '20' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: matrix-spins:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
