<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #333; color: #fff; margin: 0; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .card { background-color: #444; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h1, h2 { margin: 0 0 15px 0; }

        /* Login Screen */
        #login-screen { text-align: center; max-width: 400px; margin: 100px auto; }
        #login-screen input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #666; background-color: #555; color: #fff; }
        #login-screen button { width: 100%; padding: 10px; background-color: #007aff; color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* Dashboard */
        #dashboard-screen { display: none; }
        #dashboard-header { display: flex; justify-content: space-between; align-items: center; }

        /* Bidding Section */
        .commission-bid-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .commission-bid-row input { width: 60px; text-align: right; }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Login Screen (Initially Visible) -->
        <div id="login-screen" class="card">
            <h1>Partner Portal Login</h1>
            <input type="text" id="partner-id" placeholder="Partner ID (e.g., amazon.com)">
            <input type="password" id="password" placeholder="Password">
            <button id="login-button">Login</button>
            <p id="login-error" style="color: #ff3b30; display: none;">Invalid credentials.</p>
        </div>

        <!-- Main Dashboard (Initially Hidden) -->
        <div id="dashboard-screen">
            <div id="dashboard-header">
                <h1 id="partner-welcome"></h1>
                <button id="logout-button">Logout</button>
            </div>

            <!-- Data Visualization Section -->
            <div id="data-insights" class="card">
                <h2>Your Product Insights</h2>
                <p>Aggregated, anonymized data showing user engagement with your products.</p>
                <canvas id="insights-chart"></canvas>
            </div>

            <!-- Commission Bidding Section -->
            <div id="commission-bidding" class="card">
                <h2>Real-Time Commission Bidding</h2>
                <p>Increase your commission rate to be prioritized in our affiliate links and coupon recommendations.</p>
                <div id="bidding-controls">
                    <!-- Bidding controls will be injected here by JS -->
                </div>
                <button id="save-bids-button">Save Changes</button>
                <p id="save-status" style="display: none;"></p>
            </div>
        </div>
    </div>
    <script src="b2b_portal.js"></script>
</body>
</html>
