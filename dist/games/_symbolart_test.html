  getSeeds: async () => ({ serverSeedHash: 'x', clientSeed: 'y', nonce: 0 }),
  getFreeSpins: async () => ({ grants: [] }),
  myGameStats: async () => ({}),
};
</script>

  CasinoEngine.init('game-container', { id: 'midnight-velvet-club', name: 'Midnight Velvet' });
