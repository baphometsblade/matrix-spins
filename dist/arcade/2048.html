<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>2048 — Matrix Spins Arcade</title>
    <meta name="description" content="2048 — combine tiles to reach 2048.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="arcade.css">
</head>
<body>
    <div class="arcade-header">
        <a class="arcade-back" href="/#arcade">&larr; Arcade</a>
        <div class="arcade-title">2048</div>
        <div style="width: 90px"></div>
    </div>

    <div class="arcade-scoreboard">
        <div class="arcade-score-chip">
            <div class="arcade-score-label">Score</div>
            <div class="arcade-score-value" id="score">0</div>
        </div>
        <div class="arcade-score-chip">
            <div class="arcade-score-label">Best</div>
            <div class="arcade-score-value" id="best">0</div>
        </div>
    </div>

    <div class="arcade-canvas-wrapper">
        <canvas id="game" class="arcade-canvas" width="480" height="480"></canvas>
        <div class="arcade-overlay" id="overlay">
            <div class="arcade-overlay-title" id="overlayTitle">READY?</div>
            <div class="arcade-overlay-sub" id="overlaySub1">Slide tiles with arrows or swipe.</div>
            <div class="arcade-overlay-sub" id="overlaySub2">Combine matching tiles to reach 2048.</div>
            <button class="arcade-btn" id="playBtn">Play</button>
        </div>
    </div>

    <div class="arcade-controls">
        <button class="arcade-btn secondary" id="restartBtn">New Game</button>
    </div>

    <p class="arcade-help">
        <kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&larr;</kbd><kbd>&rarr;</kbd> or swipe &nbsp;&middot;&nbsp; reach 2048 to win
    </p>

<script>
(function () {
    'use strict';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const N = 4;
    const PAD = 12;
    const CELL = (W - PAD * (N + 1)) / N;

    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySub1 = document.getElementById('overlaySub1');
    const overlaySub2 = document.getElementById('overlaySub2');

    const STORAGE_KEY = 'arcade_2048_best';
    let best = +(localStorage.getItem(STORAGE_KEY) || 0);
    bestEl.textContent = best;

    // 2D board: N x N values, 0 = empty
    let board = [];
    let score = 0;
    let won = false, dead = false;

    const TILE_COLORS = {
        2:    { bg: '#eee4da', fg: '#776e65' },
        4:    { bg: '#ede0c8', fg: '#776e65' },
        8:    { bg: '#f2b179', fg: '#fff' },
        16:   { bg: '#f59563', fg: '#fff' },
        32:   { bg: '#f67c5f', fg: '#fff' },
        64:   { bg: '#f65e3b', fg: '#fff' },
        128:  { bg: '#edcf72', fg: '#fff' },
        256:  { bg: '#edcc61', fg: '#fff' },
        512:  { bg: '#edc850', fg: '#fff' },
        1024: { bg: '#edc53f', fg: '#fff' },
        2048: { bg: '#edc22e', fg: '#fff' },
        4096: { bg: '#e040fb', fg: '#fff' },
        8192: { bg: '#7c3aed', fg: '#fff' },
    };

    function newGame() {
        board = Array.from({ length: N }, () => new Array(N).fill(0));
        score = 0; won = false; dead = false;
        addTile(); addTile();
        scoreEl.textContent = 0;
        draw();
        hideOverlay();
    }

    function addTile() {
        const empties = [];
        for (let r = 0; r < N; r++) for (let c = 0; c < N; c++)
            if (board[r][c] === 0) empties.push([r, c]);
        if (empties.length === 0) return;
        const [r, c] = empties[Math.floor(Math.random() * empties.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function slideRow(row) {
        const filtered = row.filter(v => v !== 0);
        for (let i = 0; i < filtered.length - 1; i++) {
            if (filtered[i] === filtered[i + 1]) {
                filtered[i] *= 2;
                score += filtered[i];
                if (filtered[i] >= 2048 && !won) {
                    won = true;
                }
                filtered.splice(i + 1, 1);
            }
        }
        while (filtered.length < N) filtered.push(0);
        return filtered;
    }

    function move(dir) {
        if (dead) return false;
        const prev = JSON.stringify(board);
        if (dir === 'left') {
            for (let r = 0; r < N; r++) board[r] = slideRow(board[r]);
        } else if (dir === 'right') {
            for (let r = 0; r < N; r++) board[r] = slideRow(board[r].slice().reverse()).reverse();
        } else if (dir === 'up') {
            for (let c = 0; c < N; c++) {
                const col = board.map(row => row[c]);
                const newCol = slideRow(col);
                for (let r = 0; r < N; r++) board[r][c] = newCol[r];
            }
        } else if (dir === 'down') {
            for (let c = 0; c < N; c++) {
                const col = board.map(row => row[c]).reverse();
                const newCol = slideRow(col).reverse();
                for (let r = 0; r < N; r++) board[r][c] = newCol[r];
            }
        }
        const moved = JSON.stringify(board) !== prev;
        if (moved) {
            addTile();
            scoreEl.textContent = score;
            if (score > best) { best = score; localStorage.setItem(STORAGE_KEY, String(best)); bestEl.textContent = best; }
            draw();
            if (won) { won = false; showOverlay('2048!', 'You made it.', 'Keep going or start a new game.'); }
            else if (isDead()) {
                dead = true;
                showOverlay('GAME OVER', 'No moves left. Final score: ' + score, 'Press NEW GAME.');
            }
        }
        return moved;
    }

    function isDead() {
        for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
            if (board[r][c] === 0) return false;
            if (c + 1 < N && board[r][c] === board[r][c + 1]) return false;
            if (r + 1 < N && board[r][c] === board[r + 1][c]) return false;
        }
        return true;
    }

    function draw() {
        // Board background
        ctx.fillStyle = '#1a0e2e';
        roundRect(ctx, 0, 0, W, H, 10); ctx.fill();
        // Cells
        for (let r = 0; r < N; r++) {
            for (let c = 0; c < N; c++) {
                const x = PAD + c * (CELL + PAD);
                const y = PAD + r * (CELL + PAD);
                ctx.fillStyle = 'rgba(224, 64, 251, 0.08)';
                roundRect(ctx, x, y, CELL, CELL, 8); ctx.fill();
                const v = board[r][c];
                if (v) {
                    const col = TILE_COLORS[v] || { bg: '#3c3a32', fg: '#fff' };
                    ctx.fillStyle = col.bg;
                    roundRect(ctx, x, y, CELL, CELL, 8); ctx.fill();
                    // Shine
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fillRect(x + 4, y + 4, CELL - 8, 3);
                    // Number
                    const str = String(v);
                    const size = str.length >= 4 ? 28 : str.length >= 3 ? 36 : 48;
                    ctx.font = 'bold ' + size + 'px "Inter", system-ui, sans-serif';
                    ctx.fillStyle = col.fg;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(str, x + CELL / 2, y + CELL / 2 + 2);
                }
            }
        }
    }

    function roundRect(c, x, y, w, h, r) {
        c.beginPath(); c.moveTo(x + r, y);
        c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
        c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
        c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y); c.closePath();
    }

    function showOverlay(title, s1, s2) {
        overlayTitle.textContent = title;
        overlaySub1.textContent = s1 || '';
        overlaySub2.textContent = s2 || '';
        overlaySub1.style.display = s1 ? 'block' : 'none';
        overlaySub2.style.display = s2 ? 'block' : 'none';
        overlay.classList.add('active');
    }
    function hideOverlay() { overlay.classList.remove('active'); }

    // Input
    document.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if (k === 'arrowleft' || k === 'a') { move('left'); e.preventDefault(); }
        else if (k === 'arrowright' || k === 'd') { move('right'); e.preventDefault(); }
        else if (k === 'arrowup' || k === 'w') { move('up'); e.preventDefault(); }
        else if (k === 'arrowdown' || k === 's') { move('down'); e.preventDefault(); }
    });
    let ts = null;
    canvas.addEventListener('touchstart', e => { ts = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
    canvas.addEventListener('touchend', e => {
        if (!ts) return;
        const dx = e.changedTouches[0].clientX - ts.x;
        const dy = e.changedTouches[0].clientY - ts.y;
        ts = null;
        if (Math.abs(dx) < 25 && Math.abs(dy) < 25) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
        else move(dy > 0 ? 'down' : 'up');
    });

    document.getElementById('playBtn').addEventListener('click', () => { newGame(); });
    document.getElementById('restartBtn').addEventListener('click', () => { newGame(); });

    newGame();
    showOverlay('READY?', 'Slide tiles with arrows or swipe.', 'Combine matching tiles to reach 2048.');
})();
</script>
</body>
</html>
