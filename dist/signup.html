<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/manifest.json">
<title>Create Account — Matrix Spins</title>
<link rel="canonical" href="https://msaart.online/signup.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="unified-ux.css">
<script src="js/unified-ux.js" defer></script>
    <link rel="stylesheet" href="css/search.css">
</head>
<body>
<div class="rs-shell">
  <div class="rs-brand">Matrix Spins</div>
  <div class="rs-card">
    <h1>Create your account</h1>
    <p class="muted" style="margin-bottom:1.2rem;">Join in seconds — just email &amp; password to start playing.</p>
    <div id="alert" class="alert" role="alert" aria-live="assertive"></div>
    <form id="f">
      <div class="field"><label>Email address</label><input id="email" type="email" required autocomplete="email" placeholder="you@example.com"></div>
      <div class="field"><label>Date of birth <span style="font-size:.85rem;color:rgba(255,255,255,0.7);font-weight:600;">(must be 18+)</span></label><input id="dob" type="date" required></div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" required autocomplete="new-password" minlength="10" placeholder="10+ characters">
        <p class="muted" style="font-size:.78rem;margin-top:.3rem;">Must include uppercase, lowercase, number and special character.</p>
      </div>
      <div class="field checkbox">
        <input id="acceptTerms" type="checkbox" required>
        <label for="acceptTerms">I am 18+ and accept the <a href="terms.html" target="_blank">terms</a> &amp; <a href="responsible-gambling.html" target="_blank">responsible gambling</a> policies.</label>
      </div>
      <button id="submit" class="btn" style="width:100%;margin-top:0.5rem">Create account &amp; claim bonus →</button>
    </form>
    <div class="links">
      <a href="login.html">Already have an account?</a>
      <a href="index.html">Back to home</a>
    </div>
  </div>
</div>

<script src="js/countries.js"></script>
<script src="js/api-client.js"></script>
<script>
(async () => {
  const api = window.MatrixSpinsAPI;
  const alertEl = document.getElementById('alert');

  // If already signed in, redirect to lobby
  try { const u = await api.loadSession(); if (u) { window.location.href = 'index.html'; return; } } catch {}

  // ── Referral code capture — reads ?ref= from URL, persists in localStorage ──
  (function() {
    const params = new URLSearchParams(window.location.search);
    const ref = params.get('ref') || params.get('referral') || params.get('r');
    if (ref && ref.trim()) {
      localStorage.setItem('pendingRefCode', ref.trim().toUpperCase());
    }
  })();

  // Set max date for DOB to 18 years ago
  var dobInput = document.getElementById('dob');
  if (dobInput) {
    var maxDob = new Date();
    maxDob.setFullYear(maxDob.getFullYear() - 18);
    dobInput.max = maxDob.toISOString().split('T')[0];
  }

  function showError(msg) {
    alertEl.classList.remove('success');
    alertEl.textContent = msg;
    alertEl.classList.add('visible');
  }

  // Server requires `username` matching ^[a-zA-Z0-9_]+$ and 3-20 chars.
  // The signup form collects firstName/lastName instead, so derive a unique
  // username from the email local-part with a random suffix for collision avoidance.
  function deriveUsername(email) {
    const local = String(email || '').split('@')[0].toLowerCase().replace(/[^a-z0-9_]/g, '');
    const suffix = Math.random().toString(36).slice(2, 6).replace(/[^a-z0-9]/g, '').padEnd(4, '0');
    const base = (local || 'user').slice(0, 15);
    return (base.length >= 3 ? base : 'user') + '_' + suffix;
  }

  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    alertEl.classList.remove('visible');
    const submit = document.getElementById('submit');
    submit.disabled = true;
    try {
      const email = document.getElementById('email').value.trim();
      const pendingRef = localStorage.getItem('pendingRefCode') || '';
      const payload = {
        username:    deriveUsername(email),
        email:       email,
        password:    document.getElementById('password').value,
        dateOfBirth: document.getElementById('dob').value,
        acceptTerms: document.getElementById('acceptTerms').checked,
      };
      if (pendingRef) payload.referralCode = pendingRef;
      await api.register(payload);
      localStorage.removeItem('pendingRefCode'); // consumed
      window.location.href = 'index.html';
    } catch (err) {
      if (err.details?.issues) {
        showError(err.details.issues.map((i) => i.message).join(' '));
      } else {
        showError(err.message || 'Registration failed.');
      }
      submit.disabled = false;
    }
  });
})();
</script>
    <script src="js/social-proof.js" defer></script>
    <script src="js/deposit-urgency.js" defer></script>
    <script src="js/onboarding.js" defer></script>
    <link rel="stylesheet" href="css/chat-widget.css">
    <link rel="stylesheet" href="css/notifications.css">
    <script src="js/chat-widget.js" defer></script>
    <script src="js/notifications.js" defer></script>
    <script src="/js/pwa-install.js" defer></script>
    <script src="js/age-gate.js" defer></script>
    <script src="js/cookie-consent.js" defer></script>
    <script src="js/search.js" defer></script>
</body>
</html>
