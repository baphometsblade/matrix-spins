<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Achievements — Matrix Spins Casino</title>
<meta name="description" content="Track your badges, unlock 30+ achievements across Betting, Games, Social, and Loyalty categories. Earn XP and points toward your VIP tier.">

<meta property="og:type" content="website">

<link rel="canonical" href="https://msaart.online/achievements.html">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/achievements.css">
<link rel="stylesheet" href="css/notifications.css">
<style>
  .ach-hero { background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%); padding: 2rem; border-radius: 16px; text-align: center; margin-bottom: 1.5rem; border: 1px solid rgba(255,215,0,0.2); }
  .ach-hero .trophy { font-size: 3rem; }
  .ach-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  @media (max-width: 700px) { .ach-stats { grid-template-columns: repeat(2, 1fr); } }
  .ach-stat-card { background: rgba(255,255,255,0.04); padding: 1rem; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
  .ach-stat-card .num { font-size: 1.8rem; font-weight: 800; color: #FFD700; }
  .ach-stat-card .lbl { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .ach-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .ach-tab { padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #ccc; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
  .ach-tab.active { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; border-color: #FFD700; }
  .ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .ach-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 1rem; border-radius: 12px; transition: transform 0.2s; }
  .ach-card.unlocked { background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,165,0,0.04)); border-color: rgba(255,215,0,0.3); }
  .ach-card:hover { transform: translateY(-2px); }
  .ach-card .icon { font-size: 2.2rem; margin-bottom: 0.4rem; }
  .ach-card.locked .icon { filter: grayscale(1); opacity: 0.4; }
  .ach-card .name { font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; }
  .ach-card .desc { font-size: 0.85rem; color: #aaa; min-height: 2.4em; }
  .ach-card .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.6rem; font-size: 0.8rem; }
  .ach-card .reward { color: #FFD700; font-weight: 700; }
  .ach-card .status { color: #888; }
  .ach-card.unlocked .status { color: #5cff8c; }
  .progress-mini { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 0.4rem; overflow: hidden; }
  .progress-mini .fill { height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); transition: width 0.4s; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1f2e; border: 1px solid #FFD700; padding: 1rem 1.4rem; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); animation: slidein 0.3s; z-index: 1000; max-width: 320px; }
  @keyframes slidein { from { transform: translateX(120%); } to { transform: translateX(0); } }
</style>
<link rel="stylesheet" href="unified-ux.css">
<script src="js/unified-ux.js" defer></script>
    <link rel="stylesheet" href="css/search.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">Matrix Spins</a>
  <div class="actions">
    <span id="balanceChip" class="balance-chip">—</span>
    <a href="vip.html" class="btn btn-inline secondary">VIP</a>
    <a href="tournaments.html" class="btn btn-inline secondary">Tournaments</a>
    <a href="wallet.html" class="btn btn-inline secondary">Wallet</a>
    <button id="logout" class="btn btn-inline secondary">Sign out</button>
  </div>
</div>

<div class="rs-shell-wide" style="max-width:1200px;">

  <div class="ach-hero">
    <div class="trophy">🏆</div>
    <h1 style="margin:0.4rem 0;">Your Achievements</h1>
    <p style="color:#aaa;margin:0;">Complete challenges across Betting, Games, Social, and Loyalty categories. Each unlock adds XP to your VIP tier.</p>
  </div>

  <div class="ach-stats">
    <div class="ach-stat-card"><div class="num" id="statUnlocked">0</div><div class="lbl">Unlocked</div></div>
    <div class="ach-stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total</div></div>
    <div class="ach-stat-card"><div class="num" id="statPoints">0</div><div class="lbl">Points</div></div>
    <div class="ach-stat-card"><div class="num" id="statXP">0</div><div class="lbl">XP Earned</div></div>
  </div>

  <div class="ach-tabs" id="catTabs"></div>

  <div class="ach-grid" id="achGrid">
    <div style="grid-column:1/-1;text-align:center;color:#aaa;padding:2rem;">Loading achievements...</div>
  </div>

</div>

<div id="toastContainer"></div>

<script src="js/api-client.js"></script>
<script>
(async () => {
  'use strict';
  const api = window.MatrixSpinsAPI;
  const user = await api.loadSession();
  if (!user) { window.location.href = 'login.html?next=achievements.html'; return; }

  const $ = (id) => document.getElementById(id);
  function clearEl(e) { while (e.firstChild) e.removeChild(e.firstChild); }
  function el(tag, props, text) {
    const e = document.createElement(tag);
    if (props) Object.keys(props).forEach(k => {
      if (k === 'class') e.className = props[k];
      else if (k === 'style') e.setAttribute('style', props[k]);
      else if (k === 'data') Object.keys(props[k]).forEach(d => e.setAttribute('data-' + d, props[k][d]));
      else e.setAttribute(k, props[k]);
    });
    if (text != null) e.textContent = String(text);
    return e;
  }

  $('logout').addEventListener('click', async () => {
    try { await api.logout(); } catch (_) {}
    window.location.href = 'index.html';
  });
  try {
    const b = await api.getBalance();
    $('balanceChip').textContent = api.formatCents(b.availableCents || 0);
  } catch (_) {}

  // ── Force a re-check of achievements (idempotent) ──
  let newlyUnlocked = [];
  try {
    const checkResult = await api.fetch('/achievements/check', { method: 'POST', body: {} });
    newlyUnlocked = (checkResult && checkResult.newlyUnlocked) || [];
  } catch (_) {}

  let data;
  try {
    data = await api.fetch('/achievements');
  } catch (e) {
    $('achGrid').textContent = 'Failed to load achievements: ' + (e.message || 'unknown');
    return;
  }

  const all = (data.achievements || []);
  const stats = data.stats || {};
  $('statUnlocked').textContent = stats.unlocked || 0;
  $('statTotal').textContent = stats.total || 0;
  $('statPoints').textContent = (stats.totalPoints || 0).toLocaleString();
  $('statXP').textContent = (stats.totalXp || 0).toLocaleString();

  // ── Category tabs ──
  const cats = ['all', 'betting', 'games', 'social', 'loyalty'];
  const catLabels = { all: 'All', betting: 'Betting', games: 'Games', social: 'Social', loyalty: 'Loyalty' };
  const catIcons = { all: '🏆', betting: '🎰', games: '🎮', social: '🤝', loyalty: '⭐' };
  let activeCat = 'all';

  const tabs = $('catTabs');
  clearEl(tabs);
  cats.forEach(c => {
    const count = c === 'all' ? all.length : all.filter(a => a.category === c).length;
    const unlockedCount = c === 'all'
      ? all.filter(a => a.unlocked).length
      : all.filter(a => a.category === c && a.unlocked).length;
    const tab = el('button', { class: 'ach-tab' + (c === 'all' ? ' active' : ''), 'data-cat': c },
      catIcons[c] + ' ' + catLabels[c] + ' (' + unlockedCount + '/' + count + ')');
    tab.addEventListener('click', () => {
      activeCat = c;
      Array.from(tabs.children).forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      render();
    });
    tabs.appendChild(tab);
  });

  function render() {
    const grid = $('achGrid');
    clearEl(grid);
    const filtered = activeCat === 'all' ? all : all.filter(a => a.category === activeCat);
    if (filtered.length === 0) {
      grid.appendChild(el('p', { style: 'grid-column:1/-1;text-align:center;color:#aaa;' }, 'No achievements in this category yet.'));
      return;
    }
    filtered.forEach(a => {
      const card = el('div', { class: 'ach-card ' + (a.unlocked ? 'unlocked' : 'locked') });
      card.appendChild(el('div', { class: 'icon' }, a.icon || '🏅'));
      card.appendChild(el('div', { class: 'name' }, a.name || a.id));
      card.appendChild(el('div', { class: 'desc' }, a.desc || ''));
      const meta = el('div', { class: 'meta' });
      meta.appendChild(el('span', { class: 'reward' }, '+' + (a.xp || 0) + ' XP · ' + (a.points || 0) + ' pts'));
      const status = el('span', { class: 'status' }, a.unlocked ? '✓ Unlocked' : 'Locked');
      meta.appendChild(status);
      card.appendChild(meta);
      if (!a.unlocked && a.progress && a.progress.goal > 0) {
        const wrap = el('div', { class: 'progress-mini' });
        const fill = el('div', { class: 'fill', style: 'width:' + (a.progress.percent || 0) + '%;' });
        wrap.appendChild(fill);
        card.appendChild(wrap);
        card.appendChild(el('div', { style: 'font-size:0.75rem;color:#888;margin-top:0.2rem;' },
          (a.progress.current || 0).toLocaleString() + ' / ' + a.progress.goal.toLocaleString()));
      }
      grid.appendChild(card);
    });
  }
  render();

  // ── Toast for newly unlocked ──
  if (newlyUnlocked.length > 0) {
    const toastWrap = $('toastContainer');
    newlyUnlocked.forEach((a, i) => {
      setTimeout(() => {
        const t = el('div', { class: 'toast' });
        t.appendChild(el('strong', { style: 'font-size:1.1rem;' }, '🎉 Achievement Unlocked!'));
        t.appendChild(el('div', { style: 'margin-top:0.4rem;font-size:1.4rem;' }, a.icon || '🏆'));
        t.appendChild(el('div', { style: 'font-weight:700;' }, a.name));
        t.appendChild(el('div', { style: 'font-size:0.85rem;color:#aaa;' }, a.desc));
        t.appendChild(el('div', { style: 'margin-top:0.4rem;color:#FFD700;font-weight:700;' }, '+' + (a.xp || 0) + ' XP'));
        toastWrap.appendChild(t);
        setTimeout(() => t.remove(), 5000);
      }, i * 600);
    });
  }
})();
</script>
    <script src="js/age-gate.js" defer></script>
    <script src="js/cookie-consent.js" defer></script>
    <script src="js/search.js" defer></script>
</body>
</html>
